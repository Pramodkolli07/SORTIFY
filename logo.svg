<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78b38a" stop-opacity=".35"/>
      <stop offset="1" stop-color="#78b38a" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0f12"/>
      <stop offset="1" stop-color="#12181a"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f7f8"/>
      <stop offset="1" stop-color="#e9eeec"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="48" height="48" rx="16" fill="url(#m)" stroke="#78b38a" stroke-opacity=".35" stroke-width="2"/>

  <!-- House outline -->
  <path d="M15 28 L32 14 L49 28 V50 H15 Z" fill="none" stroke="#78b38a" stroke-opacity=".55" stroke-width="2.5"/>

  <!-- Left messy half -->
  <clipPath id="clipL">
    <rect x="15" y="14" width="17" height="36"/>
  </clipPath>
  <g clip-path="url(#clipL)">
    <path d="M15 28 L32 14 L32 50 L15 50 Z" fill="url(#left)"/>
    <!-- Clutter lines -->
    <path d="M18 36 C22 30, 26 34, 29 30" stroke="#ffffff" stroke-opacity=".18" stroke-width="2" fill="none"/>
    <path d="M18 43 C24 40, 27 45, 31 41" stroke="#78b38a" stroke-opacity=".35" stroke-width="2" fill="none"/>
    <circle cx="24" cy="33" r="4" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".14" stroke-width="1.5"/>
    <rect x="21" y="40" width="7" height="6" rx="2" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.2"/>
  </g>

  <!-- Right clean half -->
  <clipPath id="clipR">
    <rect x="32" y="14" width="17" height="36"/>
  </clipPath>
  <g clip-path="url(#clipR)">
    <path d="M32 14 L49 28 V50 H32 Z" fill="url(#right)"/>
    <rect x="34" y="34" width="13" height="9" rx="3" fill="#78b38a" fill-opacity=".18" stroke="#78b38a" stroke-opacity=".4" stroke-width="1.2"/>
    <path d="M35 26 L48 26" stroke="#0b0f12" stroke-opacity=".10" stroke-width="2" />
    <path d="M35 30 L46 30" stroke="#0b0f12" stroke-opacity=".08" stroke-width="2" />
    <rect x="36" y="40" width="10" height="6" rx="2.5" fill="#0b0f12" fill-opacity=".04" stroke="#0b0f12" stroke-opacity=".10" stroke-width="1.1"/>
  </g>
</svg>

